<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><title>IndexedDB Test</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 500px; }
  button { margin: 8px 4px; padding: 10px 16px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; }
  .bp { background: #2D4A3E; color: white; }
  .br { background: #E63312; color: white; }
  #log { background: #f5f5f5; padding: 16px; border-radius: 8px; margin-top: 16px; font-family: monospace; font-size: 13px; min-height: 120px; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>🗄️ IndexedDB Test</h2>
<p>Damit können wir testen ob IndexedDB in deinem Browser funktioniert.</p>

<button class="bp" onclick="testSave()">💾 Testdaten speichern</button>
<button class="bp" onclick="testLoad()">📖 Testdaten laden</button>
<button class="br" onclick="clearLS()">🗑️ localStorage löschen (simuliert Browser-Cache-Löschung)</button>
<button class="bp" onclick="testLoad()">📖 Nochmals laden (nach Löschung)</button>

<div id="log">Bereit. Drücke "Testdaten speichern" um zu starten...</div>

<script>
const LOG = document.getElementById('log');
function log(msg) { LOG.textContent += '\n' + msg; LOG.scrollTop = LOG.scrollHeight; }

// IndexedDB Setup
const DB_NAME = 'idb-test';
const STORE   = 'data';
let db = null;

async function openDB() {
  if (db) return db;
  return new Promise(resolve => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE);
    };
    req.onsuccess = e => {
      db = e.target.result;
      log('✅ IndexedDB geöffnet');
      resolve(db);
    };
    req.onerror = e => {
      log('❌ IndexedDB Fehler: ' + e.target.error);
      resolve(null);
    };
  });
}

async function idbSet(key, value) {
  const database = await openDB();
  if (!database) return false;
  return new Promise(resolve => {
    const tx = database.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(value, key);
    tx.oncomplete = () => { log('✅ IDB gespeichert: ' + key); resolve(true); };
    tx.onerror = e => { log('❌ IDB Speicherfehler: ' + e.target.error); resolve(false); };
  });
}

async function idbGet(key) {
  const database = await openDB();
  if (!database) return null;
  return new Promise(resolve => {
    const req = database.transaction(STORE, 'readonly').objectStore(STORE).get(key);
    req.onsuccess = () => {
      const val = req.result ?? null;
      log('📖 IDB geladen: ' + key + ' = ' + (val ? JSON.stringify(val).slice(0,50) : 'null'));
      resolve(val);
    };
    req.onerror = () => { log('❌ IDB Ladefehler'); resolve(null); };
  });
}

async function testSave() {
  LOG.textContent = '--- Speichern ---';
  const testData = { rezepte: ['Spaghetti', 'Pizza', 'Curry'], datum: new Date().toISOString() };
  // Auch in localStorage
  localStorage.setItem('test-key', JSON.stringify(testData));
  log('✅ localStorage gespeichert');
  // Und in IndexedDB
  await idbSet('test-key', testData);
}

async function testLoad() {
  LOG.textContent = '--- Laden ---';
  // localStorage
  const raw = localStorage.getItem('test-key');
  log('localStorage: ' + (raw ? JSON.parse(raw).rezepte.join(', ') : '❌ LEER (gelöscht!)'));
  // IndexedDB
  const data = await idbGet('test-key');
  log('IndexedDB: ' + (data ? data.rezepte.join(', ') + ' ✅' : '❌ LEER'));
}

function clearLS() {
  localStorage.clear();
  log('🗑️ localStorage geleert (simuliert Browser-Cache-Löschung)');
}
</script>
</body>
</html>
